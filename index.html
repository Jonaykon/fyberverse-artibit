<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image" href="icons/fav-icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" id="vp">
    <meta name="theme-color" content="#C894F9">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Fyberverse">
    <meta property="og:title" content="Fyberverse">
    <meta property="og:image" content="https://artifyber.xyz/images/temp3.png">
    <meta property="og:description" content="Welcome to the Fyberverse!">
    <meta property="og:url" content="https://blurplebun.github.io/">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.lightwidget.com/widgets/lightwidget.js"></script>
    <title>Fyberverse</title>
</head>

<body>

    <!-- App -->
    <div class="app">
        <div id="loading" style="font-family: Main;">
            <img id="loadingLogo" class="logo" src="icons/loading.gif" draggable="false">
            <p style="margin-top: 190px">Loading Fyberverse...</p>
        </div>

        <!-- Main menu -->
        <canvas id="mainMenu"></canvas>

        <br>

        <!-- Content viewer -->
        <div id="contentView" class="content-view hidden">
            <div id="contentViewHeader" class="content-view-header">
                <div id="contentViewTitle" class="content-view-title"></div>
                <div id="contentViewSubtitle" class="content-view-subtitle"></div>
                <hr>
            </div>
            <div id="contentViewGrid" class="content-view-grid"></div>
        </div>

        <br>

        <!-- Detail viewer -->
        <div id="detailView" class="detail-view hidden">
            <div id="detailViewHeader" class="detail-view-header"></div>
            <div id="detailViewContent" class="detail-view-content"></div>
        </div>

        <br>

        <!-- Image preview overlay -->
        <div id="imageView" class="image-view hidden"></div>

        <br>

        <dialog id="searchBox"></dialog>

        <!-- Interface -->
        <div id="UIPanelTop" class="hidden">

            <!-- search button -->
            <button id="searchBtn" class="search-btn ui-btn visible" title="Search">
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                            d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
                    </svg>
                </span>
            </button>

            <!-- settings button -->
            <button id="settingsBtn" class="switch-btn ui-btn visible" title="Toggle between orbit and simple mode">
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 13v-2a1 1 0 0 0-1-1h-.757l-.707-1.707.535-.536a1 1 0 0 0 0-1.414l-1.414-1.414a1 1 0 0 0-1.414 0l-.536.535L14 4.757V4a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v.757l-1.707.707-.536-.535a1 1 0 0 0-1.414 0L4.929 6.343a1 1 0 0 0 0 1.414l.536.536L4.757 10H4a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h.757l.707 1.707-.535.536a1 1 0 0 0 0 1.414l1.414 1.414a1 1 0 0 0 1.414 0l.536-.535 1.707.707V20a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-.757l1.707-.708.536.536a1 1 0 0 0 1.414 0l1.414-1.414a1 1 0 0 0 0-1.414l-.535-.536.707-1.707H20a1 1 0 0 0 1-1Z" />
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
                    </svg>
                </span>
            </button>

        </div>

        <div id="UIPanelBottom" class="hidden">

            <!-- play bgm button -->
            <button id="playBgmBtn" class="playBgm-btn ui-btn visible" title="Play Background Music">
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 18V6l8 6-8 6Z" />
                    </svg>
                </span>
            </button>

            <!-- center camera button -->
            <button id="centerBtn" class="center-btn ui-btn ui-hide" title="Center">
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 8h4V4m12 4h-4V4M4 16h4v4m12-4h-4v4" />
                    </svg>
                </span>
            </button>

            <!-- reroll button -->
            <button id="rerollBtn" class="reroll-btn ui-btn ui-hide" title="Reroll character">
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17.651 7.65a7.131 7.131 0 0 0-12.68 3.15M18.001 4v4h-4m-7.652 8.35a7.13 7.13 0 0 0 12.68-3.15M6 20v-4h4" />
                    </svg>
                </span>
            </button>

            <!-- download image button -->
            <button id="downloadImgBtn" class="download-img-btn ui-btn ui-hide" title="Download image">
                <span>
                    <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                        xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 14v4.833A1.166 1.166 0 0 1 16.833 20H5.167A1.167 1.167 0 0 1 4 18.833V7.167A1.166 1.166 0 0 1 5.167 6h4.618m4.447-2H20v5.768m-7.889 2.121 7.778-7.778" />
                    </svg>
                </span>
            </button>

            <!-- back button -->
            <button id="backBtn" class="back-btn ui-btn ui-hide" title="Back">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor">
                    <path stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6" />
                </svg>
                <span></span>
            </button>

        </div>
    </div>

    <!-- neocities thumbnail -->
    <script>
        if (navigator.userAgent === "Screenjesus") {
            location.replace("/thumbnail-neo.html");
        }
    </script>

    <audio id="sfxClick" src="audios/sfxClick.wav" preload="auto"></audio>
    <audio id="sfxLink" src="audios/sfxLink.wav" preload="auto"></audio>
    <audio id="sfxPageClose" src="audios/sfxPageClose.wav" preload="auto"></audio>
    <audio id="sfxPageOpen" src="audios/sfxPageOpen.wav" preload="auto"></audio>
    <audio id="sfxSwap" src="audios/sfxSwap.wav" preload="auto"></audio>
    <audio id="sfxWarp" src="audios/sfxWarp.wav" preload="auto"></audio>
    <audio id="bgmFyberverse" src="audios/ost/fyberverse.mp3" preload="auto" loop="loop"></audio>
    <audio id="bgmDeltadim" src="audios/ost/deltadim.mp3" preload="auto" loop="loop"></audio>
    <audio id="bgmFloriverse" src="audios/ost/floriverse.mp3" preload="auto" loop="loop"></audio>
    <audio id="bgmDigirel" src="audios/ost/digirel.mp3" preload="auto" loop="loop"></audio>
    <audio id="bgmNansenz" src="audios/ost/nansenz.mp3" preload="auto" loop="loop"></audio>
    <audio id="bgmHizen" src="audios/ost/hizen.mp3" preload="auto" loop="loop"></audio>
    <audio id="bgmNadir" src="audios/ost/nadir.mp3" preload="auto" loop="loop"></audio>
    <script src="data.js"></script>
    <script src="emoji.js"></script>
    <script src="card-scripts.js"></script>
    <script src="card-detail-scripts.js"></script>
    <script src="splashtext.js"></script>
    <script src="ticker.js"></script>
    <script src="snapshots.js"></script>
    <script src="main.js"></script>
    <script src="canvas.js"></script>
</body>

</html>
